    <!-- Paper Database & Loading Script -->
    <script>
        const papersDatabase = {
            "3": {
                title: "Evaluating Breast Cancer Treatment Outcomes Through Machine Learning Survival Analysis and Model Interpretability",
                authors: "S. K. D. Sharma, Saem Mohammad Nirob, Rumana Islam Riya, Md. Yusuf Hossain Ador, Md. Rokunuzzaman & Mohammed Islam",
                venue: "International Conference on Applied Artificial Intelligence (2AI-2026)",
                abstract: "The breast cancer survival rate prediction remains a challenge in personalized cancer treatment. It requires models that balance predictive accuracy with clinical interpretability. This study evaluates ML survival models augmented with advanced feature engineering techniques. We present an interpretable ensemble strategy that integrates Cox proportional hazards, regularized Cox regression, and random survival forest models. The model demonstrated strong performance on the SEER breast cancer dataset, with a C-index of 0.768 and an IBS of 0.087. Our key contributions include: (1) a novel node-positive ratio feature that improves risk stratification, (2) comprehensive statistical validation with confidence intervals and significance testing, (3) enhanced SHAP-based interpretability analysis that reveals clinically relevant feature interactions, and (4) external validation on multi-institutional data. The proposed ensemble model demonstrates statistically significant improvements over individual models while maintaining clinical interpretability essential for adoption in oncological practice.",
                keywords: ["Survival Analysis", "Machine Learning", "Interpretability", "SHAP", "Oncology"],
                pdfLink: "assets/cv.pdf", 
                doiLink: "https://2ai-conference.org/"
            },
            "4": {
                title: "Breast Cancer Detection with Explainable AI: Grad-CAM and Bounding Box-Based Interpretability",
                authors: "S. K. D. Sharma, Md. Yusuf Hossain Ador, Md. Rokunuzzaman, Futanta Chakma & Mahmud Hossen",
                venue: "Bangladesh Breast Cancer Conference, 2025",
                abstract: "Breast cancer detection using mammographic images is a vital application of AI in medical diagnostics, but the lack of interpretability in deep learning models limits clinical adoption. This study integrates Grad-CAM heatmaps and bounding box visualization to enhance transparency and reliability in AI-driven detection. Using the RSNA Screening Mammography dataset of 54,706 images, we addressed class imbalance through focal loss and up-sampling. Data augmentation techniques and ConvNeXtV1-small and EfficientNetV2 architectures were applied, with breast bounding boxes detected via YOLOX. ConvNeXtV1-small outperformed EfficientNetV2, achieving a probabilistic F1 (pF1) score of 0.558 versus 0.331. Grad-CAM heatmaps highlighted diagnostic features, aligning with radiologists' assessments, while bounding boxes improved lesion localization. These techniques enhance AI interpretability, improving trust in automated breast cancer detection. Future work will explore Transformer-based architectures and advanced data augmentation to improve robustness.",
                keywords: ["Computer Vision", "Explainable AI", "Grad-CAM", "Bounding Box", "Deep Learning"],
                pdfLink: "assets/cv.pdf", 
                doiLink: "https://bsbcs.info/event/1/publication/51/"
            },
            "5": {
                title: "Transformer Models for Low-Resource Language Translation",
                authors: "Collaborator A, S. K. D. Sharma, Collaborator B",
                venue: "Annual Meeting of the Association for Computational Linguistics (ACL), 2023",
                abstract: "This paper addresses the challenge of machine translation for low-resource languages. We develop a cross-lingual transfer learning approach using pre-trained transformer models, demonstrating a 35% improvement in BLEU scores for 12 underrepresented languages compared to existing baseline models.",
                keywords: ["NLP", "Machine Translation", "Transformers", "Low-Resource Languages", "Transfer Learning"],
                pdfLink: "assets/cv.pdf", 
                doiLink: "#"
            },
            "6": {
                title: "Scalable Machine Learning Pipelines for Healthcare",
                authors: "S. K. D. Sharma, Research Team",
                venue: "International Conference on Machine Learning (ICML), 2023",
                abstract: "We present a scalable, end-to-end machine learning pipeline designed for large-scale healthcare data processing. The system integrates automated data cleaning, feature engineering, and model training, reducing the time-to-insight for medical researchers by over 60% while ensuring strict compliance with data privacy regulations.",
                keywords: ["Machine Learning", "Data Pipelines", "Healthcare", "Scalability", "Data Privacy"],
                pdfLink: "assets/cv.pdf", 
                doiLink: "#"
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const paperId = urlParams.get('id');
            const paper = papersDatabase[paperId];

            if (paper) {
                document.title = paper.title + " | Samrat Kumar Dev Sharma";
                document.getElementById('paper-title').textContent = paper.title;
                document.getElementById('paper-authors').textContent = paper.authors;
                document.getElementById('paper-venue').textContent = paper.venue;
                document.getElementById('paper-abstract').textContent = paper.abstract;
                document.getElementById('link-pdf').href = paper.pdfLink;
                document.getElementById('link-doi').href = paper.doiLink;

                const keywordsContainer = document.getElementById('paper-keywords');
                keywordsContainer.innerHTML = '';
                paper.keywords.forEach(keyword => {
                    const span = document.createElement('span');
                    span.className = 'keyword-tag';
                    span.textContent = keyword;
                    keywordsContainer.appendChild(span);
                });
            } else {
                document.getElementById('paper-title').textContent = "Paper Not Found";
                // Hide all paper sections if the paper is not found
                document.querySelectorAll('.paper-section').forEach(section => {
                    section.style.display = 'none';
                });
                document.querySelector('.paper-actions').style.display = 'none';
            }
        });
    </script>
